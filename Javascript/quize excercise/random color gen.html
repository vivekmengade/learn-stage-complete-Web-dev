<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" conrdnt="width=device-width, initial-scale=1.0">
    <title>excersise 11</title>
    <style>
        .container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 100px;
            height: 100px;
            border: 2px solid rgb(0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
        <div class="box">box4</div>
        <div class="box">box5</div>
    </div>
    <script>
        console.log("hello")
        let a = document.querySelector(".container").children
        function rdcolor(){
            let val1=Math.ceil(0+Math.random()*255)
            let val2=Math.ceil(0+Math.random()*255)
            let val3=Math.ceil(0+Math.random()*255)
            return `rgb(${val1},${val2},${val3})`
        }
        Array.from(a).forEach(e=>{
            console.log(e)
            e.style.backgroundColor=rdcolor()
        })
    </script>
</body>

</html>
