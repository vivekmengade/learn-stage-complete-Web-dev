<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM & BOM</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="contaioner">
        <div class="box">box1</div>
        <div class="box" id="redbox">box2</div>
        <div class="box">box3</div>
        <div class="box">box4</div>
    </div>

    <script>
        console.log(document.getElementsByClassName("box"))
        document.getElementsByClassName(".box")
        document.querySelector("#redbox").style.color = "green"
        document.querySelectorAll(".box").forEach((e)=>{
            e.style.backgroundColor = "gray"
        })
        console.log(document.getElementsByTagName("div"))
        e=document.getElementsByTagName("div")
        console.log(e[2].matches("#redbox"))
        console.log(e[2].matches(".box"))
        console.log(e[2].matches(".redbox"))
        console.log(e[1].closest(".redbox"))
        console.log(e[1].closest(".box"))
        console.log(e[0].contains(e[2]))
        console.log(e[0].contains(e[5]))
        console.log(e[0].contains(e[0]))
    </script>
</body>

</html>
