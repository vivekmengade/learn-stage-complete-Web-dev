<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid templete 1</title>
    <style>
        .cont {
            width: 50vw;
            height: 50vh;
            border: 1px solid red;
            display: grid;
        }

        /* .cont {
            grid-template-columns: [1col] 100px [2col] 100px [3col] 100px;
            grid-template-rows: [1row] 100px [2row] 100px [3row] 100px;
        } */
        .cont{
            grid-template-areas: "nav nav nav"
                                 "side article article"
                                 "foot footer footer"
                                 "last last last ";
        }

        .item {
            /* height: auto;
            width: auto; */
            border: 2px solid rgb(55, 255, 0);
        }
        /* .i-3{
            grid-row: 2/4;
            grid-column: 1/2;
            background-color: blueviolet;
        }
        .i-2{
            grid-column: 3/4;
            grid-row: 1/3;
            background-color: aquamarine;
        }
        .i-1{
            grid-column: 1/3;
            background-color: brown;
        }
        .i-4{
            grid-row: 2/3;
            grid-column: 2/3;
            background-color: coral;
        }
        .i-5{
            grid-row: 3/4;
            grid-column: 2/4;
            background-color: cadetblue;
        } */
        .i-1{
            grid-area: nav;
            background-color: aqua;
        }
        .i-2{
            grid-area: side;
            grid-area: foot;
            background-color: aquamarine;
        }
        .i-3{
            grid-area: article;
            background-color: rgb(246, 250, 163);
        }
        .i-4{
            grid-area: footer;
            background-color: rgb(118, 237, 85);
        }
        .i-5{
            grid-area: last;
            background-color: cadetblue;
        }
    </style>
</head>

<body>
    <div class="cont">
        <div class="item i-1">1</div>
        <div class="item i-2">2</div>
        <div class="item i-3">3</div>
        <div class="item i-4">4</div>
        <div class="item i-5">5</div>
