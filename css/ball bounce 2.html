<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ball bounce animation</title>
    <style>
        .container{
            height: 70vh;
            width: 100vw;
            background-color: antiquewhite;
            position: relative;
        }
        .ball{
            height: 100px;
            width: 100px;
            border-radius: 70px;
            background-color: brown;
            box-shadow: -9px -9px 20px rgb(15, 15, 15) inset;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 900;
            color: aliceblue;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        .ball{
            animation: animatex 3s linear infinite, animatey 400ms infinite alternate; 
        }
        @keyframes animatex {
            from{
                left: 0%;
            }
            to{
                left:100%;
            }
        }
        @keyframes animatey {
            from{
                bottom: 0;
                top: 100%;
            }
            to{
                bottom: 100%;
                top: 0%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ball">
            Ball
        </div>
    </div>
</body>
</html>
