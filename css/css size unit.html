<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sizeing unit</title>
    <style>
        .div{
            width: 50px;
            height: 50px;
            background-color: darkred;
            color: white;
        }
        .div2{
            width: 50vw;
            height: 50vw;
            margin: 10px;
            background-color: darkgoldenrod;
        }
        .div3{
            width: 50vh;
            height: 50vh;
            margin: 10px;
            background-color: darkgoldenrod;
        }
        .div4{
            width: 50em;
            height: 50em;
            margin: 10px;
            background-color: darkgoldenrod;
        }
        .div5{
            width: 50rem;
            height: 50rem;
            margin: 10px;
            background-color: darkgoldenrod;
        }
        .div6{
            width: 50vmin;
            height: 50vmin;
            margin: 10px;
            background-color: darkgoldenrod;
        }
        .div7{
            width: 50vmax;
            height: 50vmax;
            margin: 10px;
            background-color: darkgoldenrod;
        }
    </style>
</head>
<body>
    <div class="div">div px unit</div>
    <div class="div2">div2 vw unit</div>
    <div class="div3">div3 vh unit</div>
    <div class="div4">div3 em unit</div>
    <div class="div5">div4 rem unit</div>
    <div class="div6">div5 vmin</div>
    <div class="div7">div5 vmax</div>
</body>
</html>
