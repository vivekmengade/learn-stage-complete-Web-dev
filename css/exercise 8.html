<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            height: 80vh;
            width: 90vw;
            background-color: antiquewhite;
            margin: auto;
            margin-top: 60px;
            border: 2px solid black;
        }
        .ball{
            height: 100px;
            width: 100px;
            background-color: cadetblue;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: -10px -5px 30px 1px darkslategray inset;
            color: aliceblue;
            font-weight: 900;
            font-family: Arial, Helvetica, sans-serif;
            font-size: larger;
        }
        .ball{
            /* transform: translateY(366px) translateX(110%); */
            animation: bounce 3s cubic-bezier(0, 0.87, 0.78, 0.66) 1s infinite forwards;
        }
        @keyframes bounce {
            0%{
                /* transform: translateY(0%); */
                transform: translateY(0%) translateX(0%);
            }
            20%{
                transform: translateY(366px) translateX(0%) rotate(45deg);
                /* transform: translateY(366px); */
            }
            40%{
                /* transform: translateY(250px) translateX(100px); */
                transform: translateY(166px) translateX(30%) rotate(90deg);
            }
            60%{
                /* transform:  translateY(366px) translateX(200px); */
                transform: translateY(366px) translateX(60%) rotate(135deg);
            }
            80%{
                /* transform: translateY(366px) translateX(260px); */
                transform: translateY(266px) translateX(80%) rotate(180deg);
            }
            100%{
                transform: translateY(366px) translateX(110%) rotate(270deg);
                /* transform: translateY(366px) translateX(260px); */
            }
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ball">
            Box
        </div>
    </div>
</body>
</html>
