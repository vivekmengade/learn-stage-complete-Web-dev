<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excersise 3</title>
    <style>
        .card{
            position: inherit;
            height: 90vh;
            width: 30vw;
            background-color: rgb(194, 194, 194);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            margin: 3vw 30vw;
            align-content: center;
            position: absolute;
        }
        #img{
            height: 17vw;
            border-radius: 20px;
            position: absolute;
            top: 2vh;
            left: 1vw;
        }
        .container{
            position: absolute;
            top: 40vh;
            left: 5vw;
            display: inline-block;
            padding: 10px;
            left: 10px;
            display: flex;
            justify-content: center;
        }
        .button{
            display: inline-block;
            background-color: rgb(156, 128, 181);
            padding: 5px;
            border-radius: 10px;
            margin: 5px ;
        }
        .heading{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
            position: absolute;
            top: 4vh;
            left: 1vw;
        }
        .para{
            position: absolute;
            top: 17vh;
            left: 1vw;
            width: 25vw;
        }
        button{
            padding: 10px;
            border-radius: 30px;
            color: rgb(131, 0, 253);
            background-color: rgb(193, 158, 226);
            border: none;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            position: absolute;
            top: 30vh;
            left: 9vw;
            width: 100px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div ><img id="img" src="https://th.bing.com/th/id/OIP.WfDSo9dwRCbT478pHIseEwHaEi?rs=1&pid=ImgDetMain" alt="img on internet"></div>
        <div class="container">
            <span class="button">button1</span>
            <span class="button">button2</span>
            <h2 class="heading">Heading</h2>
            <p class="para">Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempora impedit dignissimos cupiditate!</p>
            <button type="button">Read More</button>
        </div>
    </div>
</body>
</html>
