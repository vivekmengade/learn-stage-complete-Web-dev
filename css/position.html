<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .parent{
            height: 80em;
            width: 60vw;
            border: 2px solid red;
            padding: 0;
            margin: 0;
        }
        .box{
            /* position: fixed; */
            border: 2px solid black;
            height: 2vh;
            width: 50vw;
            padding: 5vh;
            margin: 5vh;
        }
        .box1{
            background-color: blueviolet    ;
            position: fixed;
            left: 20vw;
            z-index: 2;
        }
        .box.box2{
            background-color: antiquewhite;
            position: absolute;
            top: 10vh;
            position: sticky;
            top: 20vh;
            z-index: 1;
        }
        .box3{
            background-color: beige;
            position: relative;
            top: 20vh;
        }
        .box4{
            background-color: azure;
            position: fixed;
            top: 52vh;
        }
        .box5{
            background-color: aqua;
            position: relative;
            top: 30vh;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1">1 box position fixed</div>
        <div class="box box2">2 box position sticky</div>
        <div class="box box3">3 box position static</div>
        <div class="box box4">4 box position fixed</div>
        <div class="box box5"> 5 box relative</div>
    </div>
</body>
</html>
