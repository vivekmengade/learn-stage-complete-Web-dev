<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn list items</title>
    <style>
        ul li{
            list-style: square;
            /* background-color: brown; */
            list-style-position: inside;
            /* display: flex; */
            list-style: none ;
            padding: 2vw;
        }
        ul{
            display: flex;
        }
    </style>
</head>
<body>
    <ul>
        <li>home</li>
        <li>about</li>
        <li>contact</li>
    </ul>
</body>
</html>
